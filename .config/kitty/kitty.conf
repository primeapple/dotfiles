# Layouts
map kitty_mod+z toggle_layout stack

#### Temporary Bugfixes... ####
# see https://www.reddit.com/r/neovim/comments/vfqseq/enable_special_keyboard_combinations_in_alacritty/
map ctrl+/ send_text all \x1b[47;5u
map ctrl+- send_text all \x1b[45;5u


#### Sessions ####
# Default startup session
# startup_session tmux_session.conf

#### Plugins ####
allow_remote_control yes
include socket.conf

# Window switching
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+down neighboring_window down
map ctrl+up neighboring_window up
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+l
map --when-focus-on var:IS_NVIM ctrl+down
map --when-focus-on var:IS_NVIM ctrl+up
map --when-focus-on var:IS_NVIM ctrl+left
map --when-focus-on var:IS_NVIM ctrl+right

# Window resizing
map alt+j kitten relative_resize.py down 3
map alt+k kitten relative_resize.py up 3
map alt+h kitten relative_resize.py left 3
map alt+l kitten relative_resize.py right 3
map alt+down kitten relative_resize.py down 3
map alt+up kitten relative_resize.py up 3
map alt+left kitten relative_resize.py left 3
map alt+right kitten relative_resize.py right 3
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+l
map --when-focus-on var:IS_NVIM alt+down
map --when-focus-on var:IS_NVIM alt+up
map --when-focus-on var:IS_NVIM alt+left
map --when-focus-on var:IS_NVIM alt+right

# Scrollback
action_alias kitty_scrollback_nvim kitten '~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
map kitty_mod+[ kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output


